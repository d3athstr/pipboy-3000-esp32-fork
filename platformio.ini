; PlatformIO build for the PipBoy 3000 v2 firmware (ESP32-S3).
; Build:  pio run
; Flash (USB):  pio run -t upload --upload-port COMxx
; OTA once on WiFi:  curl -F "fw=@.pio/build/esp32s3/firmware.bin" http://<ip>/update
;
; NOTE: uses the pioarduino espressif32 fork (arduino-esp32 3.x / IDF5).
; Display is LovyanGFX (TFT_eSPI 2.5.43 does NOT drive SPI correctly on this
; core/S3 — see DISPLAY-BRINGUP-LOG.md). Put your gitignored secrets.h in
; code/PipBoy3000-S3/.

[platformio]
src_dir = code/PipBoy3000-S3

[env:esp32s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
monitor_speed = 115200
lib_deps =
    lovyan03/LovyanGFX@^1.2.0
    bitbank2/AnimatedGIF
    dfrobot/DFRobotDFPlayerMini
    adafruit/Adafruit SHT31 Library
    adafruit/Adafruit BusIO
    adafruit/RTClib
    adafruit/Adafruit MAX1704X
